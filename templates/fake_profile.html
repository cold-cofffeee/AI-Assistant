{% extends 'base.html' %}

{% block title %}Fake Profile Generator • AI Tool Suite{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto space-y-5">
    <div class="bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h1 class="text-2xl font-semibold text-slate-900">Fake Profile Generator</h1>
        <p class="text-sm text-slate-500 mt-1">Create clean mock profiles for testing and demos.</p>

        <div class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input id="ageInput" type="number" min="1" max="100" class="rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition" placeholder="Age (optional)" />
            <select id="genderInput" class="rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition">
                <option value="">Any gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <input id="countryInput" type="text" class="rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition" placeholder="Country (optional)" />
            <input id="countInput" type="number" min="1" max="20" value="1" class="rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition" placeholder="Count" />
        </div>

        <button id="generateBtn" class="mt-4 inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-medium transition duration-200 hover:bg-brand-600 hover:scale-[1.02]">Generate</button>
    </div>

    <div id="loading" class="hidden bg-white rounded-soft shadow-soft p-5 text-sm text-slate-500 flex items-center gap-3">
        <span class="w-4 h-4 rounded-full border-2 border-indigo-200 border-t-brand-500 animate-spin"></span>
        <span>Generating profiles...</span>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 text-red-700 rounded-soft p-4 text-sm"></div>

    <div id="outputSection" class="hidden bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h2 class="text-lg font-semibold text-slate-900">Profiles</h2>
        <div id="profilesContainer" class="mt-4 grid gap-3"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const generateBtn = document.getElementById('generateBtn');
    const outputSection = document.getElementById('outputSection');
    const profilesContainer = document.getElementById('profilesContainer');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    generateBtn.addEventListener('click', generateProfiles);

    async function generateProfiles() {
        const age = document.getElementById('ageInput').value.trim();
        const gender = document.getElementById('genderInput').value;
        const country = document.getElementById('countryInput').value.trim();
        const count = document.getElementById('countInput').value.trim() || '1';

        error.classList.add('hidden');
        outputSection.classList.add('hidden');
        loading.classList.remove('hidden');

        try {
            const response = await fetch('/api/fake-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ age, gender, country, count })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to generate profiles');
            }

            profilesContainer.innerHTML = '';
            data.profiles.forEach((profile, index) => {
                const card = document.createElement('article');
                card.className = 'rounded-2xl border border-slate-200 bg-slate-50/70 p-4';
                card.innerHTML = `
                    <h3 class="text-sm font-semibold text-slate-900 mb-2">Profile ${index + 1}</h3>
                    <pre class="text-xs text-slate-600 whitespace-pre-wrap">${JSON.stringify(profile, null, 2)}</pre>
                `;
                profilesContainer.appendChild(card);
            });

            outputSection.classList.remove('hidden');
            notify('Profiles generated');
        } catch (err) {
            error.textContent = err.message;
            error.classList.remove('hidden');
            notify('Generation failed', 'error');
        } finally {
            loading.classList.add('hidden');
        }
    }
</script>
{% endblock %}
