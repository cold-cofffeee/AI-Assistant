{% extends 'base.html' %}

{% block title %}Processing History • AI Tool Suite{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto space-y-5">
    <div class="bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">Processing History</h1>
                <p id="retentionInfo" class="text-sm text-slate-500 mt-1">Files expire in 60 minutes.</p>
            </div>
            <button id="clearHistoryBtn" class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-red-50 text-red-700 text-sm font-medium transition duration-200 hover:bg-red-100">Delete all history now</button>
        </div>

        <div id="historyContainer" class="space-y-3"></div>
    </div>

    <div id="loading" class="hidden bg-white rounded-soft shadow-soft p-5 text-sm text-slate-500 flex items-center gap-3">
        <span class="w-4 h-4 rounded-full border-2 border-indigo-200 border-t-brand-500 animate-spin"></span>
        <span>Loading history...</span>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 text-red-700 rounded-soft p-4 text-sm"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const historyContainer = document.getElementById('historyContainer');
    const retentionInfo = document.getElementById('retentionInfo');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    document.addEventListener('DOMContentLoaded', loadHistory);
    clearHistoryBtn.addEventListener('click', clearHistoryNow);

    async function loadHistory() {
        loading.classList.remove('hidden');
        error.classList.add('hidden');

        try {
            const response = await fetch('/api/processing-history');
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to load history');
            }

            retentionInfo.textContent = `Files expire in ${data.retention_minutes} minutes.`;
            renderHistory(data.items || []);
        } catch (err) {
            error.textContent = err.message;
            error.classList.remove('hidden');
        } finally {
            loading.classList.add('hidden');
        }
    }

    function renderHistory(items) {
        historyContainer.innerHTML = '';

        if (!items.length) {
            historyContainer.innerHTML = `
                <div class="rounded-2xl border border-slate-200 bg-slate-50/70 p-8 text-center">
                    <p class="text-sm font-medium text-slate-700">No history yet</p>
                    <p class="text-xs text-slate-400 mt-1">Processed files will appear here automatically.</p>
                </div>
            `;
            return;
        }

        items.forEach((item) => {
            const created = new Date(item.created_at).toLocaleString();
            const card = document.createElement('article');
            card.className = 'rounded-2xl border border-slate-200 bg-slate-50/70 p-4';
            card.innerHTML = `
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <div>
                        <p class="text-sm font-semibold text-slate-900">${item.tool}</p>
                        <p class="text-xs text-slate-500 mt-1">${item.successful_files}/${item.total_files} file(s) • ${created}</p>
                    </div>
                    <a href="${item.download_url}" class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-brand-500 text-white text-xs font-medium transition duration-200 hover:bg-brand-600 hover:scale-[1.02]">Download ZIP</a>
                </div>
            `;
            historyContainer.appendChild(card);
        });
    }

    async function clearHistoryNow() {
        const confirmed = confirm('This will permanently delete all processing history and ZIP files. Continue?');
        if (!confirmed) {
            return;
        }

        loading.classList.remove('hidden');
        error.classList.add('hidden');

        try {
            const response = await fetch('/api/processing-history', { method: 'DELETE' });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || 'Failed to clear history');
            }

            renderHistory([]);
            notify(data.message || 'Processing history cleared');
        } catch (err) {
            error.textContent = err.message;
            error.classList.remove('hidden');
            notify('Failed to clear history', 'error');
        } finally {
            loading.classList.add('hidden');
        }
    }
</script>
{% endblock %}
