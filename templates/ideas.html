{% extends 'base.html' %}

{% block title %}Idea Generator • AI Tool Suite{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto space-y-5">
    <div class="bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h1 class="text-2xl font-semibold text-slate-900">Idea Generator</h1>
        <p class="text-sm text-slate-500 mt-1">Generate fresh ideas for any topic in seconds.</p>
        <input id="topicInput" type="text" class="mt-5 w-full rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition" placeholder="Enter a topic..." />
        <button id="generateBtn" class="mt-4 inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-medium transition duration-200 hover:bg-brand-600 hover:scale-[1.02]">Generate</button>
    </div>

    <div id="loading" class="hidden bg-white rounded-soft shadow-soft p-5 text-sm text-slate-500 flex items-center gap-3">
        <span class="w-4 h-4 rounded-full border-2 border-indigo-200 border-t-brand-500 animate-spin"></span>
        <span>Generating ideas...</span>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 text-red-700 rounded-soft p-4 text-sm"></div>

    <div id="outputSection" class="hidden bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h2 class="text-lg font-semibold text-slate-900">Ideas</h2>
        <div id="ideasContainer" class="mt-4 grid gap-3"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const topicInput = document.getElementById('topicInput');
    const generateBtn = document.getElementById('generateBtn');
    const outputSection = document.getElementById('outputSection');
    const ideasContainer = document.getElementById('ideasContainer');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    generateBtn.addEventListener('click', generateIdeas);
    topicInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            generateIdeas();
        }
    });

    async function generateIdeas() {
        const topic = topicInput.value.trim();
        if (!topic) {
            error.textContent = 'Please enter a topic.';
            error.classList.remove('hidden');
            return;
        }

        error.classList.add('hidden');
        outputSection.classList.add('hidden');
        loading.classList.remove('hidden');

        try {
            const response = await fetch('/api/ideas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Idea generation failed');
            }

            ideasContainer.innerHTML = '';
            data.ideas.forEach((idea, index) => {
                const card = document.createElement('article');
                card.className = 'rounded-2xl border border-slate-200 bg-slate-50/70 p-4';
                card.innerHTML = `
                    <p class="text-xs text-slate-400 font-medium">IDEA ${index + 1}</p>
                    <h3 class="text-base font-semibold text-slate-900 mt-1">${idea.title}</h3>
                    <p class="text-sm text-slate-600 mt-2">${idea.description}</p>
                `;
                ideasContainer.appendChild(card);
            });

            outputSection.classList.remove('hidden');
            notify('Ideas generated');
        } catch (err) {
            error.textContent = err.message;
            error.classList.remove('hidden');
            notify('Generation failed', 'error');
        } finally {
            loading.classList.add('hidden');
        }
    }
</script>
{% endblock %}
