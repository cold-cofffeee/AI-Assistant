<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Generator - AI Writing Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 Idea Generator</h1>
            <nav class="breadcrumb">
                <a href="/">← Back to Home</a>
            </nav>
        </header>

        <main class="tool-main">
            <div class="input-section">
                <h2>Enter Your Topic</h2>
                <input type="text" id="topicInput" placeholder="Enter a topic, keyword, or theme..." />
                <button id="generateBtn" class="primary-btn">Generate Ideas</button>
            </div>

            <div class="output-section" id="outputSection" style="display: none;">
                <h2>Generated Ideas</h2>
                <div id="ideasContainer" class="ideas-grid"></div>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Generating creative ideas...</p>
            </div>

            <div class="error" id="error" style="display: none;"></div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('generateBtn').addEventListener('click', generateIdeas);
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateIdeas();
            }
        });

        async function generateIdeas() {
            const topic = document.getElementById('topicInput').value.trim();
            
            if (!topic) {
                showError('Please enter a topic to generate ideas.');
                return;
            }

            showLoading();
            hideError();
            hideOutput();

            try {
                const response = await fetch('/api/ideas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ topic: topic })
                });

                const data = await response.json();

                if (response.ok) {
                    displayIdeas(data.ideas);
                    showOutput();
                } else {
                    showError(data.error || 'An error occurred');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        }

        function displayIdeas(ideas) {
            const container = document.getElementById('ideasContainer');
            container.innerHTML = '';

            ideas.forEach((idea, index) => {
                const ideaCard = document.createElement('div');
                ideaCard.className = 'idea-card';
                ideaCard.innerHTML = `
                    <div class="idea-number">${index + 1}</div>
                    <h3>${idea.title}</h3>
                    <p>${idea.description}</p>
                `;
                container.appendChild(ideaCard);
            });
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showOutput() {
            document.getElementById('outputSection').style.display = 'block';
        }

        function hideOutput() {
            document.getElementById('outputSection').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
