<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Frame Extractor - AI Writing Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ Unique Frame Extractor</h1>
            <nav class="breadcrumb">
                <a href="/">← Back to Home</a>
            </nav>
        </header>

        <main class="tool-main">
            <div class="input-section">
                <h2>Upload Videos</h2>
                <input type="file" id="videoFiles" accept="video/*" multiple>

                <div class="inline-fields">
                    <div>
                        <label for="thresholdInput">Similarity Threshold (0.5 - 0.999)</label>
                        <input type="number" id="thresholdInput" min="0.5" max="0.999" step="0.001" value="0.95">
                    </div>
                </div>

                <button id="extractBtn" class="primary-btn">Extract Unique Frames</button>
            </div>

            <div class="output-section" id="outputSection" style="display: none;">
                <h2>Extraction Results</h2>
                <div id="extractResult" class="result-box"></div>
                <a id="downloadLink" class="primary-btn" style="display:none; text-decoration:none; text-align:center;" download>Download ZIP</a>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Extracting unique frames...</p>
            </div>

            <div class="error" id="error" style="display: none;"></div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('extractBtn').addEventListener('click', extractFrames);

        async function extractFrames() {
            const files = document.getElementById('videoFiles').files;
            const threshold = document.getElementById('thresholdInput').value;

            if (!files || files.length === 0) {
                showError('Please select at least one video file.');
                return;
            }

            const formData = new FormData();
            for (const file of files) {
                formData.append('videos', file);
            }
            formData.append('threshold', threshold);

            showLoading();
            hideError();
            hideOutput();

            try {
                const response = await fetch('/api/frame-extract-unique', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Extraction failed.');
                    return;
                }

                renderResults(data.results, data.message);
                setDownloadLink(data.download_url);
                showOutput();
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                hideLoading();
            }
        }

        function renderResults(results, message) {
            const result = document.getElementById('extractResult');
            let html = `<p><strong>${message}</strong></p><ul>`;

            results.forEach(item => {
                if (item.status === 'ok') {
                    html += `<li><strong>${item.file}</strong> — ${item.frames_saved} unique frame(s)</li>`;
                } else {
                    html += `<li><strong>${item.file}</strong> — Error: ${item.message}</li>`;
                }
            });

            html += '</ul>';
            result.innerHTML = html;
        }

        function setDownloadLink(url) {
            const link = document.getElementById('downloadLink');
            link.href = url;
            link.style.display = 'inline-block';
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showOutput() {
            document.getElementById('outputSection').style.display = 'block';
        }

        function hideOutput() {
            document.getElementById('outputSection').style.display = 'none';
            document.getElementById('downloadLink').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
