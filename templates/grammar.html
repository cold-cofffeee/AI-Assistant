{% extends 'base.html' %}

{% block title %}Grammar Checker • AI Tool Suite{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto space-y-5">
    <div class="bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h1 class="text-2xl font-semibold text-slate-900">Grammar Checker</h1>
        <p class="text-sm text-slate-500 mt-1">Review grammar, spelling, and writing style in one step.</p>
        <textarea id="inputText" class="mt-5 w-full min-h-[180px] rounded-2xl border border-slate-200 bg-slate-50/60 px-4 py-3 outline-none focus:ring-4 focus:ring-indigo-100 transition" placeholder="Type or paste your text..."></textarea>
        <button id="checkBtn" class="mt-4 inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-medium transition duration-200 hover:bg-brand-600 hover:scale-[1.02]">Check</button>
    </div>

    <div id="loading" class="hidden bg-white rounded-soft shadow-soft p-5 text-sm text-slate-500 flex items-center gap-3">
        <span class="w-4 h-4 rounded-full border-2 border-indigo-200 border-t-brand-500 animate-spin"></span>
        <span>Analyzing text...</span>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 text-red-700 rounded-soft p-4 text-sm"></div>

    <div id="outputSection" class="hidden bg-white rounded-soft shadow-soft p-6 sm:p-7">
        <h2 class="text-lg font-semibold text-slate-900">Output</h2>
        <div id="grammarResult" class="mt-4 text-sm text-slate-700 leading-relaxed"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const checkBtn = document.getElementById('checkBtn');
    const inputText = document.getElementById('inputText');
    const outputSection = document.getElementById('outputSection');
    const outputResult = document.getElementById('grammarResult');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');

    checkBtn.addEventListener('click', async () => {
        const text = inputText.value.trim();
        if (!text) {
            error.textContent = 'Please enter text to check.';
            error.classList.remove('hidden');
            return;
        }

        error.classList.add('hidden');
        outputSection.classList.add('hidden');
        loading.classList.remove('hidden');

        try {
            const response = await fetch('/api/grammar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Failed to check grammar');
            }

            outputResult.innerHTML = renderAiOutput(data.suggestions);
            outputSection.classList.remove('hidden');
            notify('Grammar check complete');
        } catch (err) {
            error.textContent = err.message;
            error.classList.remove('hidden');
            notify('Grammar check failed', 'error');
        } finally {
            loading.classList.add('hidden');
        }
    });
</script>
{% endblock %}
